services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.aether
      args:
        GO_BUILD_P: "${GO_BUILD_P:-}"
        GO_BUILD_GOMAXPROCS: "${GO_BUILD_GOMAXPROCS:-}"
    restart: unless-stopped
    environment:
      AETHER_PORT: "2095"
      AETHER_SUB_PORT: "2096"
      AETHER_DB_FOLDER: /data/db
      # Set AETHER_DB_DSN to a postgres:// URI to use PostgreSQL instead of SQLite.
      # Example: AETHER_DB_DSN=postgres://aether:secret@postgres:5432/aether?sslmode=disable
      AETHER_DB_DSN: "${AETHER_DB_DSN:-}"
      AETHER_JWT_SECRET: "${AETHER_JWT_SECRET}"
      AETHER_ADMIN_ORIGIN: "${AETHER_ADMIN_ORIGIN:-http://localhost:3000}"
      AETHER_LOG_LEVEL: "${AETHER_LOG_LEVEL:-info}"
      # Inbound port/firewall automation
      AETHER_PORT_SYNC_ENABLED: "${AETHER_PORT_SYNC_ENABLED:-true}"
      AETHER_PORT_SYNC_LOCAL_ENABLED: "${AETHER_PORT_SYNC_LOCAL_ENABLED:-true}"
      AETHER_PORT_SYNC_REMOTE_ENABLED: "${AETHER_PORT_SYNC_REMOTE_ENABLED:-true}"
      AETHER_PORT_SYNC_RETRY_SECONDS: "${AETHER_PORT_SYNC_RETRY_SECONDS:-30}"
      AETHER_PORT_SYNC_UFW_BIN: "${AETHER_PORT_SYNC_UFW_BIN:-ufw}"
    volumes:
      - aether_data:/data
    ports:
      - "2095:2095"
      - "2096:2096"
      - "8443:8443"
    # For host-level firewall control from inside the backend container,
    # run backend with host networking and NET_ADMIN capability in your environment.
    networks:
      - aether_net
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles:
      - postgres
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-aether}"
      POSTGRES_USER: "${POSTGRES_USER:-aether}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aether}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - aether_net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-}"
        NEXT_PUBLIC_SUB_URL: "${NEXT_PUBLIC_SUB_URL:-}"
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-}"
      NEXT_PUBLIC_SUB_URL: "${NEXT_PUBLIC_SUB_URL:-}"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - aether_net

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      PANEL_DOMAIN: "${PANEL_DOMAIN:-localhost}"
      API_DOMAIN: "${API_DOMAIN:-localhost}"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    networks:
      - aether_net

volumes:
  aether_data:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  aether_net:
    driver: bridge
