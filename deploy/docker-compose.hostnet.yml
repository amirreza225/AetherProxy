services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.aether
      args:
        GO_BUILD_P: "${GO_BUILD_P:-}"
        GO_BUILD_GOMAXPROCS: "${GO_BUILD_GOMAXPROCS:-}"
        GO_BUILD_GOMEMLIMIT: "${GO_BUILD_GOMEMLIMIT:-}"
        GO_BUILD_GOGC: "${GO_BUILD_GOGC:-}"
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      AETHER_PORT: "2095"
      AETHER_SUB_PORT: "2096"
      AETHER_DB_FOLDER: /data/db
      AETHER_DB_DSN: "${AETHER_DB_DSN:-}"
      AETHER_JWT_SECRET: "${AETHER_JWT_SECRET}"
      AETHER_ADMIN_ORIGIN: "${AETHER_ADMIN_ORIGIN:-http://localhost:3000}"
      AETHER_LOG_LEVEL: "${AETHER_LOG_LEVEL:-info}"
      AETHER_LOG_THROTTLE_DISABLED: "${AETHER_LOG_THROTTLE_DISABLED:-false}"
      AETHER_LOG_AUTO_THROTTLE_WINDOW_SECONDS: "${AETHER_LOG_AUTO_THROTTLE_WINDOW_SECONDS:-20}"
      AETHER_LOG_AUTO_THROTTLE_DEBUG: "${AETHER_LOG_AUTO_THROTTLE_DEBUG:-false}"
      AETHER_DOCKER_HOSTNET: "${AETHER_DOCKER_HOSTNET:-1}"
      # In host mode this can safely default to true.
      AETHER_PORT_SYNC_ENABLED: "${AETHER_PORT_SYNC_ENABLED:-true}"
      AETHER_PORT_SYNC_LOCAL_ENABLED: "${AETHER_PORT_SYNC_LOCAL_ENABLED:-true}"
      AETHER_PORT_SYNC_REMOTE_ENABLED: "${AETHER_PORT_SYNC_REMOTE_ENABLED:-true}"
      AETHER_PORT_SYNC_RETRY_SECONDS: "${AETHER_PORT_SYNC_RETRY_SECONDS:-30}"
      AETHER_PORT_SYNC_UFW_BIN: "${AETHER_PORT_SYNC_UFW_BIN:-ufw}"
    volumes:
      - aether_data:/data
      - caddy_data:/caddy-certs:ro   # gives sing-box access to Caddy's Let's Encrypt certs

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles:
      - postgres
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-aether}"
      POSTGRES_USER: "${POSTGRES_USER:-aether}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aether}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - aether_net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-}"
        NEXT_PUBLIC_SUB_URL: "${NEXT_PUBLIC_SUB_URL:-}"
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-}"
      NEXT_PUBLIC_SUB_URL: "${NEXT_PUBLIC_SUB_URL:-}"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - aether_net

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      PANEL_DOMAIN: "${PANEL_DOMAIN:-localhost}"
      API_DOMAIN: "${API_DOMAIN:-localhost}"
      API_UPSTREAM: "${API_UPSTREAM:-host.docker.internal:2095}"
      SUB_UPSTREAM: "${SUB_UPSTREAM:-host.docker.internal:2096}"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    networks:
      - aether_net

volumes:
  aether_data:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  aether_net:
    driver: bridge
